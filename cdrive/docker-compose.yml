services:
  opengauss:
    container_name: cdrive-db
    image: enmotech/opengauss:3.0.0
    restart: always
    privileged: true
    environment:
      - GS_PASSWORD=Root@123456
      - TZ=Asia/Shanghai
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"

  minio:
    container_name: cdrive-minio
    image: minio/minio:latest
    restart: always
    environment:
      - MINIO_ROOT_USER=sunrise2026
      - MINIO_ROOT_PASSWORD=sunrise2026
    command: server /data --address :9000 --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
